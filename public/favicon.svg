<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1d1916"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A5F3FC" stop-opacity="1"/>
      <stop offset="40%" stop-color="#67E8F9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD9B0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- edges (graph connections) -->
  <g stroke="#67E8F9" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="20" x2="16" y2="36"/>
    <line x1="32" y1="20" x2="48" y2="36"/>
    <line x1="16" y1="36" x2="32" y2="48"/>
    <line x1="48" y1="36" x2="32" y2="48"/>
    <line x1="16" y1="36" x2="48" y2="36"/>
    <line x1="32" y1="20" x2="32" y2="48"/>
  </g>
  <g stroke="#A5F3FC" stroke-width="0.7" stroke-linecap="round" opacity="0.55">
    <line x1="32" y1="20" x2="16" y2="36"/>
    <line x1="32" y1="20" x2="48" y2="36"/>
  </g>

  <!-- secondary glow rings on nodes -->
  <circle cx="16" cy="36" r="8" fill="url(#cyanGlow)"/>
  <circle cx="48" cy="36" r="8" fill="url(#cyanGlow)"/>
  <circle cx="32" cy="48" r="8" fill="url(#cyanGlow)"/>
  <circle cx="32" cy="20" r="9" fill="url(#amberGlow)"/>

  <!-- node cores -->
  <circle cx="16" cy="36" r="3.4" fill="#A5F3FC"/>
  <circle cx="48" cy="36" r="3.4" fill="#A5F3FC"/>
  <circle cx="32" cy="48" r="3.4" fill="#A5F3FC"/>
  <circle cx="32" cy="20" r="4.4" fill="#FCD9B0"/>
</svg>
